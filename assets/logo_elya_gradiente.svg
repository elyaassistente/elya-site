<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo ELYA - Versão com Gradiente (Sofisticada) -->
  
  <!-- Definindo gradiente -->
  <defs>
    <linearGradient id="gradiente-elya" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C5F7F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A9B8E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Símbolo -->
  <g id="simbolo">
    <circle cx="40" cy="60" r="32" stroke="url(#gradiente-elya)" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M 25 60 Q 40 30, 55 60 Q 40 75, 25 60" fill="url(#gradiente-elya)"/>
    <path d="M 40 45 L 40 65" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <path d="M 40 50 Q 45 55, 40 60" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
    <path d="M 40 50 Q 35 55, 40 60" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Texto -->
  <text x="90" y="75" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="300" fill="url(#gradiente-elya)" letter-spacing="-2">
    ELYA
  </text>
  
  <!-- Tagline -->
  <text x="90" y="92" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6B8E9F" letter-spacing="3">
    PARCEIRA DO SEU CRESCIMENTO
  </text>
</svg>